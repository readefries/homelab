apiVersion: v1
kind: Secret
metadata:
  name: photos-postgresql-secret
  namespace: photos
type: Opaque
stringData:
  POSTGRES_DB: ente
  POSTGRES_USER: ente
  POSTGRES_PASSWORD: CHANGE_ME_STRONG_DB_PASSWORD

---
apiVersion: v1
kind: Secret
metadata:
  name: photos-minio-secret
  namespace: photos
type: Opaque
stringData:
  MINIO_ROOT_USER: ente
  MINIO_ROOT_PASSWORD: CHANGE_ME_STRONG_MINIO_PASSWORD

---
apiVersion: v1
kind: Secret
metadata:
  name: photos-ente-secret
  namespace: photos
type: Opaque
stringData:
  ENTE_S3_BUCKET: ente-photos
  ENTE_S3_ACCESS_KEY: CHANGE_ME_S3_ACCESS_KEY
  ENTE_S3_SECRET_KEY: CHANGE_ME_S3_SECRET_KEY
  ENTE_JWT_SECRET: CHANGE_ME_LONG_RANDOM_JWT_SECRET
  ENTE_MASTER_KEY: CHANGE_ME_LONG_RANDOM_MASTER_KEY
