apiVersion: apps/v1
kind: Deployment
metadata:
  name: photos-ente
  namespace: photos
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: photos-ente
  template:
    metadata:
      labels:
        app: photos-ente
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z photos-postgresql.photos.svc.cluster.local 5432; do
            echo waiting for PostgreSQL
            sleep 2
          done
      - name: wait-for-minio
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z photos-minio.photos.svc.cluster.local 9000; do
            echo waiting for MinIO
            sleep 2
          done
      containers:
      - name: ente
        # Verify image/tag against the current Ente self-host docs before first deploy.
        image: ghcr.io/ente-io/server:latest
        env:
        - name: ENTE_PUBLIC_URL
          value: https://photos.xs4some.nl
        - name: ENTE_DB_HOST
          value: photos-postgresql.photos.svc.cluster.local
        - name: ENTE_DB_PORT
          value: "5432"
        - name: ENTE_DB_NAME
          valueFrom:
            secretKeyRef:
              name: photos-postgresql-secret
              key: POSTGRES_DB
        - name: ENTE_DB_USER
          valueFrom:
            secretKeyRef:
              name: photos-postgresql-secret
              key: POSTGRES_USER
        - name: ENTE_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: photos-postgresql-secret
              key: POSTGRES_PASSWORD
        - name: ENTE_S3_ENDPOINT
          value: s3.photos.xs4some.nl
        - name: ENTE_S3_ARE_LOCAL_BUCKETS
          value: "true"
        - name: ENTE_S3_USE_PATH_STYLE_URLS
          value: "true"
        - name: ENTE_S3_B2_EU_CEN_ENDPOINT
          value: s3.photos.xs4some.nl
        - name: ENTE_S3_B2_EU_CEN_REGION
          value: us-east-1
        - name: ENTE_S3_B2_EU_CEN_BUCKET
          valueFrom:
            secretKeyRef:
              name: photos-ente-secret
              key: ENTE_S3_BUCKET
        - name: ENTE_S3_B2_EU_CEN_KEY
          valueFrom:
            secretKeyRef:
              name: photos-ente-secret
              key: ENTE_S3_ACCESS_KEY
        - name: ENTE_S3_B2_EU_CEN_SECRET
          valueFrom:
            secretKeyRef:
              name: photos-ente-secret
              key: ENTE_S3_SECRET_KEY
        - name: ENTE_S3_REGION
          value: us-east-1
        - name: AWS_REGION
          value: us-east-1
        - name: AWS_DEFAULT_REGION
          value: us-east-1
        - name: ENTE_S3_BUCKET
          valueFrom:
            secretKeyRef:
              name: photos-ente-secret
              key: ENTE_S3_BUCKET
        - name: ENTE_S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: photos-ente-secret
              key: ENTE_S3_ACCESS_KEY
        - name: ENTE_S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: photos-ente-secret
              key: ENTE_S3_SECRET_KEY
        - name: ENTE_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: photos-ente-secret
              key: ENTE_JWT_SECRET
        - name: ENTE_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: photos-ente-secret
              key: ENTE_MASTER_KEY
        - name: TZ
          value: Europe/Amsterdam
        ports:
        - containerPort: 8080
          name: http
        startupProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: photos-ente
  namespace: photos
spec:
  selector:
    app: photos-ente
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
