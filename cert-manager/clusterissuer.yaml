# Cert-manager ClusterIssuer using HTTP-01 challenges via Traefik

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    # server: https://acme-v02.api.letsencrypt.org/directory
    email: readefries@xs4some.nl
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
    - http01:
        ingress:
          ingressClassName: traefik
    - dns01:
        webhook:
          groupName: acme.ixon.cloud   # must match the Helm value
          solverName: cloudns
