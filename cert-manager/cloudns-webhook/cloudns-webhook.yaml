---
# Source: cert-manager-webhook-cloudns/templates/rbac.yaml
# Grant cert-manager permission to validate using our apiserver
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloudns-webhook:domain-solver
  labels:
    app: cert-manager-webhook-cloudns
rules:
  - apiGroups:
      - acme.xs4some.nl
    resources:
      - '*'
    verbs:
      - 'create'
---
# Source: cert-manager-webhook-cloudns/templates/rbac.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloudns-webhook:flowcontrol-solver
  labels:
    app: cert-manager-webhook-cloudns
    chart: cert-manager-webhook-cloudns-1.1.1
    release: cloudns-webhook
    heritage: Helm
rules:
  - apiGroups:
      - "flowcontrol.apiserver.k8s.io"
    resources:
      - 'prioritylevelconfigurations'
      - 'flowschemas'
    verbs:
      - 'list'
      - 'watch'
---
# Source: cert-manager-webhook-cloudns/templates/secret-rbac.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloudns-webhook:cloudns-api-secret-access
  labels:
    app: cert-manager-webhook-cloudns
rules:
  - apiGroups: [""]
    resources:
      - secrets
    resourceNames:
      - cloudns-api-secret
    verbs:
      - 'get'
---
# Source: cert-manager-webhook-cloudns/templates/rbac.yaml
# apiserver gets the auth-delegator role to delegate auth decisions to
