---
# ClouDNS API credentials secret
apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: cloudns-api-secret
  namespace: cert-manager
stringData:
  auth_id: "auth_id_value"
  auth_password: "auth_password_value"

---
# DNS-01 ClusterIssuer using ClouDNS webhook (staging)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns01-cloudns-staging
spec:
  acme:
    email: readefries@xs4some.nl
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-dns01-cloudns-staging
    solvers:
    - dns01:
        webhook:
          groupName: acme.xs4some.nl
          solverName: cloudns

---
# DNS-01 ClusterIssuer using ClouDNS webhook (production)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns01-cloudns
spec:
  acme:
    email: readefries@xs4some.nl
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-dns01-cloudns
    solvers:
    - dns01:
        webhook:
          groupName: acme.xs4some.nl
          solverName: cloudns
