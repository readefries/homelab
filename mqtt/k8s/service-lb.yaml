apiVersion: v1
kind: Service
metadata:
  name: mosquitto-lb
  namespace: mqtt
  annotations:
    metallb.universe.tf/address-pool: dynamic-pool
spec:
  type: LoadBalancer
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
  - IPv4
  - IPv6
  selector:
    app: mosquitto
  ports:
  - name: mqtt
    port: 1883
    targetPort: 1883
    protocol: TCP
  externalTrafficPolicy: Local
  loadBalancerSourceRanges:
  - 172.16.0.0/22
